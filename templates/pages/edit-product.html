{% extends "layouts/base-products.html" %}

{% block content %}

    <section class="bg-white dark:bg-gray-900 mb-5 mt-5">
        <form method='post' class="max-w-lg mx-auto" enctype="multipart/form-data">
            {% csrf_token %}

            {% for field in form %}
            <div class="mb-5">
                <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">{{ field.label }} </label>
                {{ field }}
            </div>
            {% endfor %}

            <button type="submit" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm w-full sm:w-auto px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">Submit</button>
        </form>
    </section>


{% endblock content %}
